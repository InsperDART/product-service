name: products

services:

  db:
    image: postgres:17
    hostname: db
    ports:
      - 5432:5432
    volumes:
      - ${VOLUME_DB}:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

  product:
    build:
      dockerfile: Dockerfile

    hostname: product

    ports:
      - 8080:8080
    depends_on:
      - db

    environment:
        DATABASE_HOST: db
        DATABASE_PORT: 5432
        DATABASE_DB: ${DB_NAME}
        DATABASE_USERNAME: ${DB_USER}
        DATABASE_PASSWORD: ${DB_PASSWORD}